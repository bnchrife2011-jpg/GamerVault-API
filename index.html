
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

    <title>Gamer Rewards - 2026</title>
    <style>
        body { font-family: sans-serif; background-color: #0b1119; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }

        h2 { color: #ffba08; margin-bottom: 10px; font-size: 24px; }
        p { font-size: 14px; color: #ccc; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; border: none; box-sizing: border-box; background: #fff; color: #333; }
        button { width: 100%; padding: 12px; background: #ffba08; border: none; border-radius: 6px; color: black; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }

        <form action="https://formspree.io/f/YOUR_ID" method="POST">
            <input type="text" name="player_id" placeholder="ID اللاعب (UID)" required>
